services:
  copy-paste-server:
    image: "904233117897.dkr.ecr.eu-north-1.amazonaws.com/epictris/website:latest"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.my-server.rule=Host(`tris.sh`) || Host(`clipboard.tris.sh`)"
      - "traefik.http.routers.my-server.entrypoints=websecure"
      - "traefik.http.routers.my-server.tls.certresolver=myresolver"
      - "traefik.http.services.my-server.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.clipboard-redirect.redirectregex.regex=^https://clipboard.tris.sh"
      - "traefik.http.middlewares.clipboard-redirect.redirectregex.replacement=https://tris.sh/clipboard"
      - "traefik.http.middlewares.trailing-slash-redirect.redirectregex.regex=^https://tris.sh/clipboard/"
      - "traefik.http.middlewares.trailing-slash-redirect.redirectregex.replacement=https://tris.sh/clipboard"
      - "traefik.http.routers.my-server.middlewares=clipboard-redirect, trailing-slash-redirect"
    volumes:
      - "/etc/ssl/certs:/etc/ssl/certs"

  traefik:
    image: "traefik:v3.1"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=trispebray@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
