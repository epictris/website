name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose and Caddy config
        run: |
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            compose.yml Caddyfile ubuntu@${{ vars.SSH_HOST }}:/opt/website/

      - name: Pull and restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ vars.SSH_HOST }} \
            "WEBSITE_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }} \
             docker compose -f /opt/website/compose.yml up -d --pull always"
