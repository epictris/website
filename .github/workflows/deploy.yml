name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'clipboard/**'
      - 'Dockerfile'
      - 'compose.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push clipboard image
        uses: docker/build-push-action@v6
        with:
          context: ./clipboard
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/clipboard:latest
            ghcr.io/${{ github.repository }}/clipboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose and Caddy config
        run: |
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            compose.yml Caddyfile ubuntu@${{ vars.SSH_HOST }}:/opt/website/

      - name: Pull and restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ vars.SSH_HOST }} \
            "export WEBSITE_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }} \
             && export CLIPBOARD_IMAGE=ghcr.io/${{ github.repository }}/clipboard:${{ github.sha }} \
             && docker compose -f /opt/website/compose.yml up -d --pull always \
             && docker compose -f /opt/website/compose.yml restart caddy"
