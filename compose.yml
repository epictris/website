services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - website
      - clipboard

  website:
    image: ${WEBSITE_IMAGE}
    restart: unless-stopped
    environment:
      - PORT=3000

  clipboard:
    image: ${CLIPBOARD_IMAGE}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
